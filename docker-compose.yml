services:
  go-httpbin:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LOG_FORMAT=json

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:latest
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./config/observability/config.alloy:/etc/alloy/config.alloy
      # Perlu akses ke docker.sock untuk membaca log container
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - loki
      - go-httpbin

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./config/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - loki
      - prometheus
      - tempo

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    ports:
      - 9090:9090
    volumes:
      - ./config/observability/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - go-httpbin

  tempo:
    image: grafana/tempo:main-814c1c6
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/observability/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # tempo
      - "4317"        # otlp grpc
